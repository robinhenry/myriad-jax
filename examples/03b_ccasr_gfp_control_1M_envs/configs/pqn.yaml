# @package _global_
# PQN config for CcaSR-GFP control with 1M parallel environments.
defaults:
  - _self_

run:
  seed: 0
  steps_per_env: 288
  num_envs: 1e6
  rollout_steps: 4
  eval_frequency: 144
  eval_rollouts: 100           # lightweight eval during training
  eval_max_steps: 288
  save_agent_checkpoint: false  # checkpoint serialization for Flax structs is broken; see platform/serialization.py

env:
  name: ccasr-gfp-control
  frame_stack_n: 16           # stack last 16 observations (paper: frame_obs_stack_size=16)

agent:
  name: pqn
  epsilon_start: 1.0
  epsilon_end: 0.007
  epsilon_decay_fraction: 0.237
  hidden_size: 256
  num_layers: 2
  gamma: 0.954
  lambda_: 0.342
  reward_scale: 0.1
  max_grad_norm: 0.308
  num_epochs: 8
  num_minibatches: 8
  learning_rate: 5e-5
  lr_decay_fraction: 0.602
  lr_end: 0

wandb:
  enabled: false
